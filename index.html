<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Kmi</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="stars"></div>

<section class="hero">

<div class="hero-content">

<h1>📚 Biblioteca de Kmi</h1>

<p class="subtitle">
Un rincón mágico para guardar todas tus historias favoritas
</p>

<div class="quote-card">
<h2>✨ Frase del día</h2>
<p id="quote"></p>
</div>

<button id="enterBtn">
Entrar a la Biblioteca
</button>

</div>

</section>

<section class="hidden-section" id="librarySection">

<div class="letter">

<h2>💌 Para Kmi</h2>

<p>
Cada libro abre una puerta a un mundo diferente.
Quise regalarte un lugar donde puedas guardar todas esas aventuras,
porque sé cuánto amas perderte entre páginas.
</p>

</div>

<h2 class="shelf-title">
📖 Mi Biblioteca
</h2>

<div class="controls">

<input type="file" id="bookInput" accept=".pdf,.epub">

<label for="bookInput" class="upload-btn">
➕ Añadir Libro
</label>

</div>

<div id="bookshelf" class="bookshelf">

</div>

</section>

<script src="script.js"></script>

</body>
</html>
