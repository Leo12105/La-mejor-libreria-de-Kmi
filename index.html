<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kmii Books - Biblioteca Virtual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C63FF;
            --primary-dark: #5A52D5;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #22223a;
            --text: #e0e0e0;
            --text-muted: #8888aa;
            --accent: #ff6584;
            --success: #4ecdc4;
            --border: #2a2a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, var(--bg-card) 0%, #16213e 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 2em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .logo span {
            font-size: 0.5em;
            display: block;
            background: none;
            -webkit-text-fill-color: var(--text-muted);
            font-weight: 400;
        }

        /* ===== BARRA DE HERRAMIENTAS ===== */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(26, 26, 46, 0.8);
            border-bottom: 1px solid var(--border);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid var(--border);
            border-radius: 25px;
            background: var(--bg-dark);
            color: var(--text);
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(108, 99, 255, 0.3);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1em;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(108, 99, 255, 0.4);
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #e0456b);
            color: white;
        }

        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 101, 132, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #3dbdb5);
            color: #111;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #c0392b);
            color: white;
            padding: 8px 16px;
            font-size: 0.8em;
        }

        /* ===== FILTROS ===== */
        .filters {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-card);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ===== GRID DE LIBROS ===== */
        .stats {
            text-align: center;
            padding: 15px;
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .book-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid var(--border);
            cursor: pointer;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.2);
            border-color: var(--primary);
        }

        .book-cover {
            width: 100%;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            position: relative;
            overflow: hidden;
        }

        .book-cover.pdf {
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
        }

        .book-cover.epub {
            background: linear-gradient(135deg, var(--success), #2ecc71);
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-format {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }

        .book-format.pdf {
            background: rgba(255, 107, 107, 0.9);
            color: white;
        }

        .book-format.epub {
            background: rgba(78, 205, 196, 0.9);
            color: #111;
        }

        .book-info {
            padding: 15px;
        }

        .book-title {
            font-size: 0.95em;
            font-weight: 700;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .book-meta {
            font-size: 0.8em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .book-size {
            font-size: 0.75em;
            color: var(--text-muted);
        }

        .book-actions {
            display: flex;
            gap: 5px;
            padding: 0 15px 15px;
        }

        .book-actions .btn {
            flex: 1;
            padding: 8px;
            font-size: 0.8em;
            justify-content: center;
            border-radius: 10px;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
            overflow: hidden;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.2em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5em;
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .modal-body {
            padding: 25px;
        }

        /* ===== ZONA DE IMPORTAR ===== */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(108, 99, 255, 0.1);
        }

        .drop-zone-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .drop-zone-text {
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .drop-zone-hint {
            font-size: 0.8em;
            color: var(--text-muted);
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-dark);
            color: var(--text);
            font-size: 0.95em;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .file-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .file-preview-icon {
            font-size: 2em;
        }

        .file-preview-info {
            flex: 1;
        }

        .file-preview-name {
            font-weight: 600;
            font-size: 0.9em;
            word-break: break-all;
        }

        .file-preview-size {
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .file-preview .remove-file {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.2em;
            cursor: pointer;
        }

        /* ===== LECTOR / VISOR ===== */
        .reader-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 2000;
            flex-direction: column;
        }

        .reader-overlay.active {
            display: flex;
        }

        .reader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            min-height: 50px;
        }

        .reader-title {
            font-size: 0.95em;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }

        .reader-content {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .reader-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .epub-content {
            max-width: 800px;
            padding: 30px 20px;
            line-height: 1.8;
            font-size: 1.1em;
            color: var(--text);
            width: 100%;
        }

        .epub-content h1,
        .epub-content h2,
        .epub-content h3 {
            color: var(--primary);
            margin: 20px 0 10px;
        }

        .epub-content p {
            margin-bottom: 15px;
            text-align: justify;
        }

        .epub-nav {
            display: flex;
            gap: 10px;
            padding: 15px;
            justify-content: center;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--text);
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-size: 0.9em;
            font-weight: 500;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            max-width: 300px;
        }

        .toast.success {
            background: linear-gradient(135deg, var(--success), #2ecc71);
            color: #111;
        }

        .toast.error {
            background: linear-gradient(135deg, #ff4757, #c0392b);
        }

        .toast.info {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(10px); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .books-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 12px;
            }

            .book-cover {
                height: 180px;
            }

            .toolbar {
                padding: 10px;
            }

            .logo {
                font-size: 1.5em;
            }

            .btn {
                padding: 10px 18px;
                font-size: 0.85em;
            }

            header {
                padding: 15px;
            }

            .epub-content {
                padding: 20px 15px;
                font-size: 1em;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* ===== CONFIRM DIALOG ===== */
        .confirm-dialog {
            text-align: center;
            padding: 10px 0;
        }

        .confirm-dialog p {
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            📚 Kmii Books
            <span>Tu biblioteca personal</span>
        </div>
    </header>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar libros...">
        </div>
        <button class="btn btn-primary" onclick="openImportModal()">
            📥 Importar
        </button>
        <button class="btn btn-accent" onclick="exportLibrary()">
            💾 Backup
        </button>
    </div>

    <!-- FILTROS -->
    <div class="filters">
        <button class="filter-btn active" onclick="filterBooks('all', this)">📚 Todos</button>
        <button class="filter-btn" onclick="filterBooks('pdf', this)">📕 PDF</button>
        <button class="filter-btn" onclick="filterBooks('epub', this)">📗 EPUB</button>
        <button class="filter-btn" onclick="filterBooks('Ficción', this)">🌟 Ficción</button>
        <button class="filter-btn" onclick="filterBooks('Educación', this)">🎓 Educación</button>
        <button class="filter-btn" onclick="filterBooks('Aventura', this)">⚔️ Aventura</button>
        <button class="filter-btn" onclick="filterBooks('Misterio', this)">🔍 Misterio</button>
        <button class="filter-btn" onclick="filterBooks('Ciencia', this)">🔬 Ciencia</button>
        <button class="filter-btn" onclick="filterBooks('Otro', this)">📖 Otro</button>
    </div>

    <!-- STATS -->
    <div class="stats" id="statsBar">
        0 libros en tu biblioteca
    </div>

    <!-- GRID DE LIBROS -->
    <div class="books-grid" id="booksGrid">
        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📚</div>
            <h3>Tu biblioteca está vacía</h3>
            <p>Toca "Importar" para añadir tu primer libro (PDF o EPUB)</p>
        </div>
    </div>

    <!-- MODAL IMPORTAR -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <h2>📥 Importar Libro</h2>
                <button class="modal-close" onclick="closeImportModal()">✕</button>
            </div>
            <div class="modal-body">
                <!-- Drop Zone -->
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div class="drop-zone-icon">📂</div>
                    <div class="drop-zone-text">Toca para seleccionar archivo</div>
                    <div class="drop-zone-hint">PDF o EPUB · máx. 50MB</div>
                </div>

                <input type="file" id="fileInput" accept=".pdf,.epub" style="display:none" onchange="handleFileSelect(event)">

                <!-- File Preview -->
                <div class="file-preview" id="filePreview" style="display:none">
                    <div class="file-preview-icon" id="filePreviewIcon">📄</div>
                    <div class="file-preview-info">
                        <div class="file-preview-name" id="filePreviewName">-</div>
                        <div class="file-preview-size" id="filePreviewSize">-</div>
                    </div>
                    <button class="remove-file" onclick="removeSelectedFile()">✕</button>
                </div>

                <!-- Formulario -->
                <div class="form-group">
                    <label>Título del libro</label>
                    <input type="text" id="bookTitle" placeholder="Nombre del libro">
                </div>
                <div class="form-group">
                    <label>Autor</label>
                    <input type="text" id="bookAuthor" placeholder="Autor del libro">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="bookCategory">
                        <option value="Ficción">🌟 Ficción</option>
                        <option value="Educación">🎓 Educación</option>
                        <option value="Aventura">⚔️ Aventura</option>
                        <option value="Misterio">🔍 Misterio</option>
                        <option value="Ciencia">🔬 Ciencia</option>
                        <option value="Otro">📖 Otro</option>
                    </select>
                </div>

                <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:10px;" onclick="saveBook()">
                    ✅ Guardar en Biblioteca
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMAR BORRAR -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <div class="modal-header">
                <h2>🗑️ Eliminar Libro</h2>
                <button class="modal-close" onclick="closeDeleteModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="confirm-dialog">
                    <p>¿Estás seguro de que quieres eliminar <strong id="deleteBookName"></strong>?</p>
                    <div class="confirm-actions">
                        <button class="btn btn-danger" onclick="confirmDelete()">🗑️ Eliminar</button>
                        <button class="btn btn-primary" onclick="closeDeleteModal()">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- LECTOR -->
    <div class="reader-overlay" id="readerOverlay">
        <div class="reader-header">
            <span class="reader-title" id="readerTitle">-</span>
            <button class="btn btn-accent" onclick="closeReader()" style="padding:8px 16px; font-size:0.85em;">✕ Cerrar</button>
        </div>
        <div class="reader-content" id="readerContent"></div>
        <div class="epub-nav" id="epubNav" style="display:none">
            <button class="btn btn-primary" onclick="epubPrevPage()">◀ Anterior</button>
            <span id="epubPageInfo" style="display:flex;align-items:center;color:var(--text-muted);font-size:0.9em;"></span>
            <button class="btn btn-primary" onclick="epubNextPage()">Siguiente ▶</button>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ===== BASE DE DATOS LOCAL =====
        const DB_NAME = 'KmiiBooksDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'books';
        let db;
        let selectedFile = null;
        let selectedFileData = null;
        let currentFilter = 'all';
        let deleteBookId = null;

        // EPUB state
        let epubSections = [];
        let epubCurrentSection = 0;

        // Inicializar IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        const store = database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('format', 'format', { unique: false });
                        store.createIndex('category', 'category', { unique: false });
                        store.createIndex('date', 'dateAdded', { unique: false });
                    }
                };
            });
        }

        // Guardar libro en DB
        function addBookToDB(book) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put(book);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // Obtener todos los libros
        function getAllBooks() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Obtener un libro por ID
        function getBookById(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Eliminar libro
        function deleteBookFromDB(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // ===== INTERFAZ =====

        // Abrir modal de importar
        function openImportModal() {
            document.getElementById('importModal').classList.add('active');
            resetImportForm();
        }

        // Cerrar modal de importar
        function closeImportModal() {
            document.getElementById('importModal').classList.remove('active');
            resetImportForm();
        }

        // Resetear formulario
        function resetImportForm() {
            selectedFile = null;
            selectedFileData = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('dropZone').style.display = 'block';
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookAuthor').value = '';
            document.getElementById('bookCategory').value = 'Ficción';
        }

        // Manejar selección de archivo
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            processFile(file);
        }

        // Procesar archivo
        function processFile(file) {
            const ext = file.name.split('.').pop().toLowerCase();

            if (ext !== 'pdf' && ext !== 'epub') {
                showToast('Solo se permiten archivos PDF y EPUB', 'error');
                return;
            }

            if (file.size > 50 * 1024 * 1024) {
                showToast('El archivo excede 50MB', 'error');
                return;
            }

            selectedFile = file;

            // Mostrar preview
            document.getElementById('dropZone').style.display = 'none';
            document.getElementById('filePreview').style.display = 'flex';
            document.getElementById('filePreviewIcon').textContent = ext === 'pdf' ? '📕' : '📗';
            document.getElementById('filePreviewName').textContent = file.name;
            document.getElementById('filePreviewSize').textContent = formatSize(file.size);

            // Auto-rellenar título
            const title = file.name.replace(/\.(pdf|epub)$/i, '').replace(/[_-]/g, ' ');
            document.getElementById('bookTitle').value = title;

            // Leer archivo como base64
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedFileData = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Quitar archivo seleccionado
        function removeSelectedFile() {
            selectedFile = null;
            selectedFileData = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('dropZone').style.display = 'block';
        }

        // Guardar libro
        async function saveBook() {
            if (!selectedFile || !selectedFileData) {
                showToast('Selecciona un archivo primero', 'error');
                return;
            }

            const title = document.getElementById('bookTitle').value.trim() || selectedFile.name;
            const author = document.getElementById('bookAuthor').value.trim() || 'Desconocido';
            const category = document.getElementById('bookCategory').value;
            const ext = selectedFile.name.split('.').pop().toLowerCase();

            const book = {
                id: 'book_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                title: title,
                author: author,
                category: category,
                format: ext,
                fileName: selectedFile.name,
                fileSize: selectedFile.size,
                fileData: selectedFileData,
                dateAdded: new Date().toISOString()
            };

            try {
                await addBookToDB(book);
                showToast(`"${title}" añadido a tu biblioteca`, 'success');
                closeImportModal();
                renderBooks();
            } catch (err) {
                showToast('Error al guardar: ' + err.message, 'error');
            }
        }

        // Renderizar libros
        async function renderBooks() {
            const grid = document.getElementById('booksGrid');
            const empty = document.getElementById('emptyState');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            try {
                let books = await getAllBooks();

                // Ordenar por fecha (más reciente primero)
                books.sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));

                // Filtrar
                if (currentFilter !== 'all') {
                    books = books.filter(b =>
                        b.format === currentFilter || b.category === currentFilter
                    );
                }

                // Buscar
                if (searchTerm) {
                    books = books.filter(b =>
                        b.title.toLowerCase().includes(searchTerm) ||
                        b.author.toLowerCase().includes(searchTerm)
                    );
                }

                // Actualizar stats
                const allBooks = await getAllBooks();
                document.getElementById('statsBar').textContent =
                    `${allBooks.length} libro${allBooks.length !== 1 ? 's' : ''} en tu biblioteca` +
                    (books.length !== allBooks.length ? ` · Mostrando ${books.length}` : '');

                if (books.length === 0) {
                    grid.innerHTML = '';
                    if (empty) {
                        grid.appendChild(empty);
                        empty.style.display = 'block';
                        empty.querySelector('h3').textContent = searchTerm || currentFilter !== 'all'
                            ? 'No se encontraron libros'
                            : 'Tu biblioteca está vacía';
                        empty.querySelector('p').textContent = searchTerm || currentFilter !== 'all'
                            ? 'Intenta con otro filtro o término de búsqueda'
                            : 'Toca "Importar" para añadir tu primer libro (PDF o EPUB)';
                    }
                    return;
                }

                grid.innerHTML = books.map(book => `
                    <div class="book-card" ondblclick="openBook('${book.id}')">
                        <div class="book-cover ${book.format}">
                            ${book.format === 'pdf' ? '📕' : '📗'}
                            <span class="book-format ${book.format}">${book.format}</span>
                        </div>
                        <div class="book-info">
                            <div class="book-title">${escapeHtml(book.title)}</div>
                            <div class="book-meta">✍️ ${escapeHtml(book.author)}</div>
                            <div class="book-size">📁 ${formatSize(book.fileSize)} · ${book.category}</div>
                        </div>
                        <div class="book-actions">
                            <button class="btn btn-primary" onclick="openBook('${book.id}')">📖 Leer</button>
                            <button class="btn btn-danger" onclick="openDeleteModal('${book.id}', '${escapeHtml(book.title)}')">🗑️</button>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error('Error rendering books:', err);
            }
        }

        // Filtrar libros
        function filterBooks(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderBooks();
        }

        // Abrir libro para leer
        async function openBook(id) {
            try {
                const book = await getBookById(id);
                if (!book) {
                    showToast('Libro no encontrado', 'error');
                    return;
                }

                document.getElementById('readerTitle').textContent = book.title;
                const content = document.getElementById('readerContent');
                const epubNav = document.getElementById('epubNav');

                if (book.format === 'pdf') {
                    // PDF: usar iframe con data URL
                    epubNav.style.display = 'none';
                    content.innerHTML = `<iframe src="${book.fileData}" title="PDF Viewer"></iframe>`;
                } else if (book.format === 'epub') {
                    // EPUB: parsear y mostrar
                    epubNav.style.display = 'flex';
                    content.innerHTML = '<div class="epub-content" id="epubDisplay"><p style="text-align:center;color:var(--text-muted);">⏳ Cargando EPUB...</p></div>';
                    await parseAndDisplayEpub(book.fileData);
                }

                document.getElementById('readerOverlay').classList.add('active');
                document.body.style.overflow = 'hidden';

            } catch (err) {
                showToast('Error al abrir: ' + err.message, 'error');
            }
        }

        // Cerrar lector
        function closeReader() {
            document.getElementById('readerOverlay').classList.remove('active');
            document.getElementById('readerContent').innerHTML = '';
            document.body.style.overflow = '';
            epubSections = [];
            epubCurrentSection = 0;
        }

        // ===== EPUB PARSER BÁSICO =====
        async function parseAndDisplayEpub(dataUrl) {
            try {
                // Convertir data URL a ArrayBuffer
                const base64 = dataUrl.split(',')[1];
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }

                // EPUB es un ZIP - parseamos manualmente
                const zip = await parseZip(bytes.buffer);

                // Buscar archivos HTML/XHTML dentro del EPUB
                epubSections = [];
                const htmlFiles = [];

                // Buscar container.xml para obtener el orden
                let opfPath = '';
                const containerFile = zip.find(f => f.name.endsWith('container.xml'));
                if (containerFile) {
                    const containerXml = new TextDecoder().decode(containerFile.data);
                    const match = containerXml.match(/full-path="([^"]+)"/);
                    if (match) opfPath = match[1];
                }

                // Buscar OPF para obtener el orden de los archivos
                let orderedFiles = [];
                if (opfPath) {
                    const opfFile = zip.find(f => f.name === opfPath || f.name.endsWith(opfPath.split('/').pop()));
                    if (opfFile) {
                        const opfContent = new TextDecoder().decode(opfFile.data);
                        // Extraer items del manifest
                        const itemMatches = [...opfContent.matchAll(/href="([^"]+)"[^>]*media-type="application\/xhtml\+xml"/g)];
                        const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';
                        itemMatches.forEach(m => {
                            const href = opfDir + m[1];
                            orderedFiles.push(href);
                        });
                    }
                }

                // Si no encontramos el orden, buscar cualquier HTML
                if (orderedFiles.length === 0) {
                    zip.forEach(f => {
                        if (f.name.match(/\.(html|xhtml|htm)$/i) && !f.name.includes('nav') && !f.name.includes('toc')) {
                            orderedFiles.push(f.name);
                        }
                    });
                }

                // Extraer contenido de cada sección
                orderedFiles.forEach(path => {
                    const file = zip.find(f => f.name === path || f.name.endsWith(path.split('/').pop()));
                    if (file) {
                        let html = new TextDecoder().decode(file.data);
                        // Extraer solo el body
                        const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                        if (bodyMatch) {
                            html = bodyMatch[1];
                        }
                        // Limpiar tags problemáticos
                        html = html.replace(/<script[\s\S]*?<\/script>/gi, '');
                        html = html.replace(/<style[\s\S]*?<\/style>/gi, '');
                        html = html.replace(/<link[^>]*>/gi, '');
                        if (html.trim().length > 10) {
                            epubSections.push(html);
                        }
                    }
                });

                if (epubSections.length === 0) {
                    // Fallback: mostrar todo el texto
                    let allText = '';
                    zip.forEach(f => {
                        if (f.name.match(/\.(html|xhtml|htm)$/i)) {
                            const text = new TextDecoder().decode(f.data);
                            allText += text;
                        }
                    });
                    if (allText) {
                        const bodyMatch = allText.match(/<body[^>]*>([\s\S]*?)<\/body>/gi);
                        if (bodyMatch) {
                            epubSections = bodyMatch.map(b => b.replace(/<\/?body[^>]*>/gi, ''));
                        } else {
                            epubSections = [allText.replace(/<[^>]+>/g, '')];
                        }
                    } else {
                        epubSections = ['<p>No se pudo extraer el contenido del EPUB.</p>'];
                    }
                }

                epubCurrentSection = 0;
                displayEpubSection();

            } catch (err) {
                console.error('EPUB parse error:', err);
                document.getElementById('epubDisplay').innerHTML =
                    `<p>⚠️ Error al leer el EPUB: ${err.message}</p>
                     <p style="color:var(--text-muted);font-size:0.9em;">Algunos EPUBs con DRM o formatos complejos pueden no ser compatibles.</p>`;
            }
        }

        function displayEpubSection() {
            const display = document.getElementById('epubDisplay');
            if (display && epubSections.length > 0) {
                display.innerHTML = epubSections[epubCurrentSection];
                display.scrollTop = 0;
                document.getElementById('epubPageInfo').textContent =
                    `${epubCurrentSection + 1} / ${epubSections.length}`;
            }
        }

        function epubPrevPage() {
            if (epubCurrentSection > 0) {
                epubCurrentSection--;
                displayEpubSection();
            }
        }

        function epubNextPage() {
            if (epubCurrentSection < epubSections.length - 1) {
                epubCurrentSection++;
                displayEpubSection();
            }
        }

        // ===== ZIP PARSER MÍNIMO =====
        async function parseZip(buffer) {
            const view = new DataView(buffer);
            const files = [];
            let offset = 0;
            const uint8 = new Uint8Array(buffer);

            while (offset < buffer.byteLength - 4) {
                const sig = view.getUint32(offset, true);
                if (sig !== 0x04034b50) break; // Local file header signature

                const compressionMethod = view.getUint16(offset + 8, true);
                const compressedSize = view.getUint32(offset + 18, true);
                const uncompressedSize = view.getUint32(offset + 22, true);
                const nameLength = view.getUint16(offset + 26, true);
                const extraLength = view.getUint16(offset + 28, true);

                const nameBytes = uint8.slice(offset + 30, offset + 30 + nameLength);
                const name = new TextDecoder().decode(nameBytes);

                const dataStart = offset + 30 + nameLength + extraLength;
                const dataEnd = dataStart + compressedSize;

                let fileData;
                if (compressionMethod === 0) {
                    // Stored (sin comprimir)
                    fileData = uint8.slice(dataStart, dataEnd);
                } else if (compressionMethod === 8) {
                    // Deflate
                    try {
                        const compressed = uint8.slice(dataStart, dataEnd);
                        const ds = new DecompressionStream('raw-deflate');
                        const writer = ds.writable.getWriter();
                        const reader = ds.readable.getReader();

                        writer.write(compressed);
                        writer.close();

                        const chunks = [];
                        let totalLength = 0;
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            chunks.push(value);
                            totalLength += value.length;
                        }

                        fileData = new Uint8Array(totalLength);
                        let pos = 0;
                        for (const chunk of chunks) {
                            fileData.set(chunk, pos);
                            pos += chunk.length;
                        }
                    } catch (e) {
                        fileData = uint8.slice(dataStart, dataEnd);
                    }
                } else {
                    fileData = uint8.slice(dataStart, dataEnd);
                }

                if (!name.endsWith('/')) {
                    files.push({ name, data: fileData });
                }

                offset = dataEnd;

                // Buscar descriptor de datos si existe
                if (view.getUint16(offset + 6, true) & 0x0008) {
                    // Data descriptor puede estar presente
                }
            }

            return files;
        }

        // ===== DELETE =====
        function openDeleteModal(id, title) {
            deleteBookId = id;
            document.getElementById('deleteBookName').textContent = title;
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            deleteBookId = null;
            document.getElementById('deleteModal').classList.remove('active');
        }

        async function confirmDelete() {
            if (deleteBookId) {
                try {
                    await deleteBookFromDB(deleteBookId);
                    showToast('Libro eliminado', 'info');
                    closeDeleteModal();
                    renderBooks();
                } catch (err) {
                    showToast('Error al eliminar', 'error');
                }
            }
        }

        // ===== EXPORT / BACKUP =====
        async function exportLibrary() {
            try {
                const books = await getAllBooks();
                if (books.length === 0) {
                    showToast('No hay libros para exportar', 'error');
                    return;
                }

                // Exportar metadatos (sin los archivos grandes)
                const metadata = books.map(b => ({
                    id: b.id,
                    title: b.title,
                    author: b.author,
                    category: b.category,
                    format: b.format,
                    fileName: b.fileName,
                    fileSize: b.fileSize,
                    dateAdded: b.dateAdded
                }));

                const blob = new Blob([JSON.stringify(metadata, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `kmii-books-backup-${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('Backup de metadatos descargado', 'success');
            } catch (err) {
                showToast('Error al exportar', 'error');
            }
        }

        // ===== UTILIDADES =====
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ===== DRAG & DROP =====
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });

        // ===== BÚSQUEDA =====
        document.getElementById('searchInput').addEventListener('input', () => {
            renderBooks();
        });

        // ===== INICIAR =====
        (async () => {
            try {
                await initDB();
                renderBooks();
                showToast('📚 Biblioteca cargada', 'success');
            } catch (err) {
                showToast('Error al iniciar la base de datos', 'error');
                console.error(err);
            }
        })();
    </script>
